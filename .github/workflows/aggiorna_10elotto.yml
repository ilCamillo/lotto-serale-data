name: Aggiorna 10eLotto Serale

on:
  schedule:
    # Copertura ogni 20 minuti dalle 19:00 alle 20:40 italiane
    # Estate CEST = UTC+2 → sottraiamo 2 ore
    - cron: '0 17 * * 2'     # mar 19:00
    - cron: '0 17 * * 4'     # gio 19:00
    - cron: '0 17 * * 5'     # ven 19:00
    - cron: '0 17 * * 6'     # sab 19:00
    - cron: '20 17 * * 2'    # mar 19:20
    - cron: '20 17 * * 4'
    - cron: '20 17 * * 5'
    - cron: '20 17 * * 6'
    - cron: '40 17 * * 2'    # mar 19:40
    - cron: '40 17 * * 4'
    - cron: '40 17 * * 5'
    - cron: '40 17 * * 6'
    - cron: '0 18 * * 2'     # mar 20:00
    - cron: '0 18 * * 4'
    - cron: '0 18 * * 5'
    - cron: '0 18 * * 6'
    - cron: '20 18 * * 2'    # mar 20:20
    - cron: '20 18 * * 4'
    - cron: '20 18 * * 5'
    - cron: '20 18 * * 6'
    - cron: '40 18 * * 2'    # mar 20:40
    - cron: '40 18 * * 4'
    - cron: '40 18 * * 5'
    - cron: '40 18 * * 6'
  workflow_dispatch:

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SCRAPE_DO_TOKEN: ${{ secrets.SCRAPE_DO_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Esegui fetch con retry automatico
        run: python fetch_10elotto.py

      - name: Commit e push JSON + CSV aggiornati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ultima_estrazione.json storico_10elotto_serale.csv
          git diff --cached --quiet || git commit -m "Estrazione $(python -c "import json; d=json.load(open('ultima_estrazione.json')); print(d['data_testo'])")"
          git push

name: Aggiorna 10eLotto Serale

on:
  schedule:
    # ── Copertura ogni 20 min dalle 18:00 alle 19:40 italiane ──────────
    # (sito sicuramente non aggiornato, 1 chiamata ciascuna poi esce)
    - cron: '0 16 * * 2,4,5,6'    # 18:00 IT
    - cron: '20 16 * * 2,4,5,6'   # 18:20 IT
    - cron: '40 16 * * 2,4,5,6'   # 18:40 IT
    - cron: '0 17 * * 2,4,5,6'    # 19:00 IT
    - cron: '20 17 * * 2,4,5,6'   # 19:20 IT
    - cron: '40 17 * * 2,4,5,6'   # 19:40 IT

    # ── Copertura ogni 5 min dalle 20:00 alle 20:30 italiane ───────────
    # (finestra critica: il sito si aggiorna qui)
    - cron: '0 18 * * 2,4,5,6'    # 20:00 IT
    - cron: '5 18 * * 2,4,5,6'    # 20:05 IT
    - cron: '10 18 * * 2,4,5,6'   # 20:10 IT
    - cron: '15 18 * * 2,4,5,6'   # 20:15 IT
    - cron: '20 18 * * 2,4,5,6'   # 20:20 IT
    - cron: '25 18 * * 2,4,5,6'   # 20:25 IT
    - cron: '30 18 * * 2,4,5,6'   # 20:30 IT

    # ── Backup ogni 20 min fino alle 21:00 ─────────────────────────────
    - cron: '40 18 * * 2,4,5,6'   # 20:40 IT
    - cron: '0 19 * * 2,4,5,6'    # 21:00 IT

  workflow_dispatch:

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SCRAPE_DO_TOKEN: ${{ secrets.SCRAPE_DO_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Esegui fetch
        run: python fetch_10elotto.py

      - name: Commit e push se aggiornato
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ultima_estrazione.json storico_10elotto_serale.csv
          git diff --cached --quiet || git commit -m "Estrazione $(python -c "import json; d=json.load(open('ultima_estrazione.json')); print(d['data_testo'])")"
          git push

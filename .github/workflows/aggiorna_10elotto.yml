name: Aggiorna 10eLotto Serale

on:
  schedule:
    - cron: '0 18 * * 2'
    - cron: '0 18 * * 4'
    - cron: '0 18 * * 5'
    - cron: '0 18 * * 6'
    - cron: '20 18 * * 2'
    - cron: '20 18 * * 4'
    - cron: '20 18 * * 5'
    - cron: '20 18 * * 6'
    - cron: '40 18 * * 2'
    - cron: '40 18 * * 4'
    - cron: '40 18 * * 5'
    - cron: '40 18 * * 6'
  workflow_dispatch:

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SCRAPE_DO_TOKEN: ${{ secrets.SCRAPE_DO_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Esegui fetch con retry automatico
        run: python fetch_10elotto.py

      - name: Commit e push JSON + CSV aggiornati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ultima_estrazione.json storico_10elotto_serale.csv
          git diff --cached --quiet || git commit -m "Estrazione $(python -c "import json; d=json.load(open('ultima_estrazione.json')); print(d['data_testo'])")"
          git push
